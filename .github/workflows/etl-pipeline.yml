name: Clean Delivery 10-Min ETL Pipeline

on:
  schedule:
    # 매일 UTC 15:00, 16:00, 17:00, 18:00, 19:00, 20:00 (KST 00:00 ~ 05:00 매 정각)
    # 총 6번 실행되어 확실하게 깨어납니다.
    - cron: '0 15-20 * * *'
  workflow_dispatch: # 깃허브 웹사이트에서 수동으로 'Run workflow'를 누를 수 있게 버턴을 만들어 줍니다.

concurrency:
  group: delivery-etl-group
  cancel-in-progress: false # 기존에 돌고 있는 중요한 데이터 수집을 강제로 끄지 않도록 false 설정

jobs:
  run-etl:
    runs-on: ubuntu-latest
    
    # 깃허브 액션이 스스로 current_index.txt 파일을 수정하고 커밋/푸시할 수 있는 쓰기 권한 부여
    permissions:
      contents: write

    steps:
    # 1. 내 코드 리포지토리 내려받기
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 파이썬 환경 세팅
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. 최적화된 필수 패키지만 빠르게 설치 (가상환경 필요 없음)
    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install requests pandas sqlalchemy psycopg2-binary python-dotenv

    # 4. 메인 컨트롤러 가동 (Secrets 보안 변수들을 환경변수로 주입)
    - name: Run ETL Main Controller
      env:
        YOGIYO_API_KEY: ${{ secrets.YOGIYO_API_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        python3 main.py

    # 5. 한국 시간을 계산해서 last_updated.txt 파일로 저장
    - name: Create Last Updated Timestamp File
      run: |
        # Ubuntu 서버 시간(UTC)에 9시간을 더해 한국 시간을 생성합니다.
        KST_TIME=$(date -d "+9 hours" "+%Y-%m-%d %H:%M:%S")
        
        # 프로젝트 루트 폴더에 last_updated.txt 파일로 저장 (기존 내용 덮어쓰기)
        echo "$KST_TIME" > last_updated.txt
        echo "마지막 수정 일시 기록 완료: $KST_TIME"

    # 6. 변경된 current_index.txt, last_updated.txt 파일을 내 리포지토리에 자동 Push 하여 상태 유지
    - name: Commit and Push Next Index Status
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # current_index.txt 파일에 변경 사항이 있는지 체크
        if git diff --quiet current_index.txt last_updated.txt; then
          echo "변경 사항이 없습니다."
        else
          git add current_index.txt last_updated.txt
          git commit -m "CHG: 행정동 수집 인덱스 업데이트 [skip ci]"
          git push
        fi