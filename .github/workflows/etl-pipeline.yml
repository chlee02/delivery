name: Clean Delivery 10-Min ETL Pipeline

on:
  schedule:
    # 매일 UTC 15:00 ~ 21:00 사이에만 10분마다 실행 (한국 시간 자정 00:00 ~ 아침 06:00)
    # 6시간 가량 가동하여 하루에 딱 36개 행정동씩만 깔끔하게 수집합니다.
    - cron: '*/10 15-20 * * *'
  workflow_dispatch: # 깃허브 웹사이트에서 수동으로 'Run workflow'를 누를 수 있게 버턴을 만들어 줍니다.

jobs:
  run-etl:
    runs-on: ubuntu-latest
    
    # 깃허브 액션이 스스로 current_index.txt 파일을 수정하고 커밋/푸시할 수 있는 쓰기 권한 부여
    permissions:
      contents: write

    steps:
    # 1. 내 코드 리포지토리 내려받기
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 파이썬 환경 세팅
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. 최적화된 필수 패키지만 빠르게 설치 (가상환경 필요 없음)
    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install requests pandas sqlalchemy psycopg2-binary python-dotenv

    # 4. 메인 컨트롤러 가동 (Secrets 보안 변수들을 환경변수로 주입)
    - name: Run ETL Main Controller
      env:
        YOGIYO_API_KEY: ${{ secrets.YOGIYO_API_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        python3 main.py

    # 5. 변경된 current_index.txt 파일을 내 리포지토리에 자동 Push 하여 상태 유지
    - name: Commit and Push Next Index Status
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # current_index.txt 파일에 변경 사항이 있는지 체크
        if git diff --quiet current_index.txt; then
          echo "변경 사항이 없습니다."
        else
          git add current_index.txt
          git commit -m "CHG: 행정동 수집 인덱스 업데이트 [skip ci]"
          git push
        fi